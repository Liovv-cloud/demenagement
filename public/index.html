<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Déménagement</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
:root {
  --bg:#f5f2ec; --surface:#fff; --border:#e2ddd4;
  --accent:#c4773a; --accent-l:#f5e6d8;
  --lio:#3a7fc4; --lio-l:#d8eaf5;
  --laisser:#3aab6e; --laisser-l:#d8f5e6;
  --vendre:#c43a3a; --vendre-l:#f5d8d8;
  --niv2:#8a6a3a; --niv2-l:#f5eed8;
  --rox:#7a3ac4; --rox-l:#ead8f5;
  --text:#1a1612; --muted:#8a8278;
  --radius:14px; --sidebar:68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#1a1612;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s ease,transform .6s ease;}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
.splash-logo svg{width:110px;height:110px;animation:logoIn .8s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes logoIn{from{opacity:0;transform:scale(.6) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.splash-title{font-size:28px;font-weight:800;color:#f5f2ec;letter-spacing:-.02em;animation:fadeUp .6s .3s ease both;}
.splash-title span{color:var(--accent);}
.splash-sub{font-size:13px;color:#6a6258;letter-spacing:.08em;text-transform:uppercase;animation:fadeUp .6s .5s ease both;}
.splash-bar-wrap{width:160px;height:3px;background:#2a2520;border-radius:2px;overflow:hidden;animation:fadeUp .4s .7s ease both;}
.splash-bar{height:100%;background:linear-gradient(90deg,var(--accent),#e8a86a);width:0%;animation:loadBar 2.2s .8s ease forwards;}
@keyframes loadBar{to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* LAYOUT */
#app{display:none;height:100vh;flex-direction:row;}
#app.show{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:#1a1612;display:flex;flex-direction:column;align-items:center;padding:12px 0 20px;gap:2px;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-logo{margin-bottom:6px;padding:8px 0 10px;border-bottom:1px solid #2a2520;width:100%;display:flex;justify-content:center;}
.sidebar-logo svg{width:34px;height:34px;}
.sb-btn{width:54px;min-height:52px;border-radius:12px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:5px 4px;transition:all .18s;position:relative;}
.sb-btn .fi{font-size:18px;line-height:1;}
.sb-btn .fl{font-size:8px;font-weight:600;color:#5a5248;text-align:center;line-height:1.2;letter-spacing:.04em;font-family:'Outfit',sans-serif;}
.sb-btn .fc{position:absolute;top:4px;right:4px;background:var(--accent);color:#fff;font-size:8px;font-weight:700;border-radius:8px;padding:1px 4px;display:none;}
.sb-btn.has-todo .fc{display:block;}
.sb-btn.active{background:rgba(196,119,58,.15);}
.sb-btn.active .fl{color:var(--accent);}
.sb-divider{width:30px;height:1px;background:#2a2520;margin:4px 0;flex-shrink:0;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{background:rgba(245,242,236,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 8px;flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.topbar-title{font-size:17px;font-weight:700;}
.topbar-title span{color:var(--accent);}
.sync-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .3s;}
.sync-dot.ok{background:var(--laisser);box-shadow:0 0 5px var(--laisser);}
.sync-dot.syncing{background:var(--accent);animation:pulse .8s infinite;}
.sync-dot.err{background:var(--vendre);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#e8a86a);border-radius:2px;transition:width .5s;}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}

/* FILTERS */
.qfilters{display:flex;gap:5px;padding:8px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.qfilters::-webkit-scrollbar{display:none;}
.qchip{padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'Outfit',sans-serif;}
.qchip.active{border-color:var(--accent);background:var(--accent-l);color:var(--accent);}
.qchip.qniv2.active{border-color:var(--niv2);background:var(--niv2-l);color:var(--niv2);}
.qchip.qlio.active{border-color:var(--lio);background:var(--lio-l);color:var(--lio);}
.qchip.qlai.active{border-color:var(--laisser);background:var(--laisser-l);color:var(--laisser);}
.qchip.qven.active{border-color:var(--vendre);background:var(--vendre-l);color:var(--vendre);}
.qchip.qrox.active{border-color:var(--rox);background:var(--rox-l);color:var(--rox);}
.qchip.qdone.active{border-color:#5a9e6a;background:#e6f5e8;color:#3a7a4a;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 90px;}

/* ROOMS */
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.05);overflow:hidden;}
.room-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.room-hdr:active{background:#f9f7f3;}
.room-icon{font-size:20px;flex-shrink:0;}
.room-info{flex:1;min-width:0;}
.room-name{font-size:14px;font-weight:600;}
.room-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.room-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.room-ring{width:32px;height:32px;flex-shrink:0;}
.room-ring-bg{fill:none;stroke:var(--border);stroke-width:3;}
.room-ring-fg{fill:none;stroke:var(--laisser);stroke-width:3;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .5s;}
.room-ring-txt{font-size:7px;font-weight:700;fill:var(--text);font-family:'Outfit',sans-serif;}
.chevron{color:var(--muted);font-size:10px;transition:transform .22s;flex-shrink:0;}
.room-card.open .chevron{transform:rotate(180deg);}
.room-body{display:none;border-top:1px solid var(--border);}
.room-card.open .room-body{display:block;}

/* ITEMS */
.item-row{padding:10px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(226,221,212,.5);}
.item-row:last-of-type{border-bottom:none;}
.item-tap{flex:1;display:flex;align-items:center;gap:9px;cursor:pointer;min-width:0;}
.item-tap:active{opacity:.8;}
.chk{width:22px;height:22px;border-radius:7px;flex-shrink:0;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .18s;}
.item-row.done .chk{background:var(--laisser);border-color:var(--laisser);}
.item-body{flex:1;min-width:0;}
.item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;}
.item-row.done .item-name{color:var(--muted);text-decoration:line-through;}
.item-note{font-size:10px;color:var(--muted);margin-top:1px;}
.item-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
.badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:10px;letter-spacing:.04em;flex-shrink:0;text-transform:uppercase;white-space:nowrap;}
.b-niv{background:var(--accent-l);color:var(--accent);}
.b-niv2{background:var(--niv2-l);color:var(--niv2);border:1px dashed #c4a070;}
.b-lio{background:var(--lio-l);color:var(--lio);}
.b-lais{background:var(--laisser-l);color:var(--laisser);}
.b-vend{background:var(--vendre-l);color:var(--vendre);}
.b-rox{background:var(--rox-l);color:var(--rox);}
.b-autre{background:#f0ede8;color:var(--muted);}
.item-actions{display:flex;gap:2px;flex-shrink:0;}
.act-btn{background:none;border:none;padding:5px;cursor:pointer;font-size:14px;color:#ccc;transition:color .18s;line-height:1;}
.act-btn:active{color:var(--accent);}
.act-btn.del:active{color:var(--vendre);}

/* QUICK ADD */
.qadd-row{padding:8px 14px;display:flex;gap:6px;align-items:center;border-top:1px solid var(--border);background:#faf9f6;}
.qadd-input{flex:1;background:none;border:none;font-size:12px;color:var(--muted);font-family:'Outfit',sans-serif;outline:none;}
.qadd-input::placeholder{color:#c0bab2;}
.qadd-dest{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 5px;font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif;outline:none;max-width:82px;}
.qadd-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;padding:5px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}

/* STATS */
#stats-page{display:none;flex:1;flex-direction:column;overflow:hidden;}
#stats-page.show{display:flex;}
.stats-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px;}
.stat-title{font-size:18px;font-weight:800;margin-bottom:14px;}
.stat-title span{color:var(--accent);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.kpi-val{font-size:32px;font-weight:800;line-height:1;}
.kpi-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.chart-card h3{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
canvas{width:100% !important;}
.floor-stat{margin-bottom:10px;}
.floor-stat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.floor-stat-name{font-size:12px;font-weight:600;}
.floor-stat-nums{font-size:11px;color:var(--muted);}
.floor-stat-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.floor-stat-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#e8a86a);transition:width .6s;}

/* FAB */
.fab{position:fixed;bottom:18px;right:14px;z-index:200;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:12px 18px;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;box-shadow:0 4px 18px rgba(196,119,58,.45);display:flex;align-items:center;gap:7px;transition:transform .15s;}
.fab:active{transform:scale(.96);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:none;align-items:flex-end;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:22px 22px 0 0;padding:20px 18px 44px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-hdr h2{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.fgrp{margin-bottom:13px;}
.flbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;}
.finp,.fsel{width:100%;padding:11px 13px;border-radius:11px;border:1.5px solid var(--border);font-size:14px;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none;}
.finp:focus,.fsel:focus{border-color:var(--accent);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.submit-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:4px;}

/* PHOTO */
.photo-area{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;background:var(--bg);}
.photo-area.has-img{border-color:var(--accent);padding:0;}
.photo-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-preview{width:100%;max-height:180px;object-fit:cover;border-radius:10px;display:none;}
.photo-area.has-img .photo-preview{display:block;}
.photo-placeholder{font-size:28px;margin-bottom:4px;}
.photo-hint{font-size:11px;color:var(--muted);}
.photo-area.has-img .photo-placeholder,.photo-area.has-img .photo-hint{display:none;}
.photo-remove{display:none;position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;align-items:center;justify-content:center;z-index:2;}
.photo-area.has-img .photo-remove{display:flex;}

/* TOAST */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1612;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;z-index:700;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .big{font-size:40px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <path d="M95 155 Q80 70, 60 55 Q140 110, 150 120 Q160 110, 240 55 Q210 90, 200 155 Q150 180, 95 155 Z" fill="#c4773a"/>
      <path d="M140 215 Q150 223, 160 215 L150 250 L140 215 Z" fill="#c4773a"/>
    </svg>
  </div>
  <div class="splash-title">Démé<span>nagement</span></div>
  <div class="splash-sub">Suivi du déménagement</div>
  <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR: Stats · RDC · 1er · 2e · 3e · (séparateur) · Cave -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <path d="M95 155 Q80 70, 60 55 Q140 110, 150 120 Q160 110, 240 55 Q210 90, 200 155 Q150 180, 95 155 Z" fill="#c4773a"/>
        <path d="M140 215 Q150 223, 160 215 L150 250 L140 215 Z" fill="#c4773a"/>
      </svg>
    </div>
    <button class="sb-btn" id="sb-stats" onclick="showPage('stats')">
      <span class="fi">📊</span><span class="fl">Stats</span>
    </button>
    <div class="sb-divider"></div>
    <button class="sb-btn" id="sb-rdc" onclick="showPage('Rez-de-chaussée')">
      <span class="fi">🏠</span><span class="fl">R.D.C.</span><span class="fc" id="cnt-rdc"></span>
    </button>
    <button class="sb-btn" id="sb-1er" onclick="showPage('1er étage')">
      <span class="fi">1️⃣</span><span class="fl">1er</span><span class="fc" id="cnt-1er"></span>
    </button>
    <button class="sb-btn" id="sb-2e" onclick="showPage('2e étage')">
      <span class="fi">2️⃣</span><span class="fl">2e</span><span class="fc" id="cnt-2e"></span>
    </button>
    <button class="sb-btn" id="sb-3e" onclick="showPage('3e étage')">
      <span class="fi">3️⃣</span><span class="fl">3e</span><span class="fc" id="cnt-3e"></span>
    </button>
    <div class="sb-divider"></div>
    <button class="sb-btn" id="sb-cave" onclick="showPage('Cave')">
      <span class="fi">🍷</span><span class="fl">Cave</span><span class="fc" id="cnt-cave"></span>
    </button>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="topbar-row">
        <div class="topbar-title" id="topbarTitle">📊 <span>Statistiques</span></div>
        <div class="sync-row"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">—</span></div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-labels"><span id="progLeft">Chargement…</span><span id="progRight">0%</span></div>
    </div>

    <div class="qfilters" id="qfilters" style="display:none">
      <button class="qchip active" onclick="setQF('all',this)">Tout</button>
      <button class="qchip qdone" onclick="setQF('done',this)">✅ Faits</button>
      <button class="qchip"       onclick="setQF('todo',this)">⏳ À faire</button>
      <button class="qchip"       onclick="setQF('Nivelles',this)">🏠 Nivelles</button>
      <button class="qchip qniv2" onclick="setQF('Nivelles ?',this)">🏠 Niv.?</button>
      <button class="qchip qlio"  onclick="setQF('Lio',this)">🌊 Lio</button>
      <button class="qchip qlai"  onclick="setQF('Laisser',this)">📌 Laisser</button>
      <button class="qchip qven"  onclick="setQF('Vendre',this)">♻️ Vendre</button>
      <button class="qchip qrox"  onclick="setQF('Rox',this)">🎮 Rox/Lenny</button>
    </div>

    <div id="stats-page" class="show"><div class="stats-scroll" id="statsContent"></div></div>
    <div id="floor-page" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="scroll-area" id="floorContent"></div>
    </div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="openAddModal()" style="display:none">＋ Ajouter</button>

<!-- MODAL ADD/EDIT -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modalTitle">Ajouter un objet</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="editIdx" value="-1">

    <div class="fgrp">
      <label class="flbl">Nom de l'objet</label>
      <input class="finp" id="mItem" placeholder="ex: Lampe de salon" autocomplete="off">
    </div>

    <div class="frow">
      <div class="fgrp">
        <label class="flbl">Étage</label>
        <select class="fsel" id="mFloor" onchange="updateRoomOptions()">
          <option value="">— choisir —</option>
          <option>Rez-de-chaussée</option>
          <option>1er étage</option>
          <option>2e étage</option>
          <option>3e étage</option>
          <option>Cave</option>
        </select>
      </div>
      <div class="fgrp">
        <label class="flbl">Pièce</label>
        <select class="fsel" id="mRoom">
          <option value="">— d'abord l'étage —</option>
        </select>
      </div>
    </div>

    <div class="fgrp">
      <label class="flbl">Destination</label>
      <select class="fsel" id="mDest">
        <option value="Nivelles">🏠 Nivelles</option>
        <option value="Nivelles ?">🏠 Nivelles (à confirmer)</option>
        <option value="Lio">🌊 Lio</option>
        <option value="À laisser">📌 À laisser sur place</option>
        <option value="À vendre/jeter">♻️ À vendre / jeter</option>
        <option value="Rox/Lenny">🎮 Rox / Lenny</option>
        <option value="Garage">🔧 Garage</option>
      </select>
    </div>

    <div class="fgrp">
      <label class="flbl">Note (responsable, fragile…)</label>
      <input class="finp" id="mNote" placeholder="ex: Anne, fragile, à démontrer…">
    </div>

    <div class="fgrp">
      <label class="flbl">Photo (optionnel)</label>
      <div class="photo-area" id="photoArea">
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
        <div class="photo-placeholder">📷</div>
        <div class="photo-hint">Appuyer pour ajouter une photo</div>
        <img class="photo-preview" id="photoPreview" src="" alt="">
        <button class="photo-remove" id="photoRemove" onclick="removePhoto(event)">✕</button>
      </div>

// ===== BADGE =====
function badge(d){
  if(!d) return {cls:'b-autre',lbl:'?'};
  const dl=d.toLowerCase();
  if(dl.includes('laisser'))                    return {cls:'b-lais',lbl:'Laisser'};
  if(dl.includes('vendre')||dl.includes('jeter'))return {cls:'b-vend',lbl:'Vendre/jeter'};
  if(dl==='nivelles')                           return {cls:'b-niv', lbl:'Nivelles'};
  if(dl.includes('nivelles'))                   return {cls:'b-niv2',lbl:'Niv. ?'};
  if(dl==='lio')                                return {cls:'b-lio', lbl:'Lio'};
  if(dl.includes('rox')||dl.includes('lenny'))  return {cls:'b-rox', lbl:'Rox/Lenny'};
  return {cls:'b-autre',lbl:d};
}
function ikey(f,r,i){return f+'|||'+r+'|||'+i;}

// ===== FILTER =====
function matchQ(it){
  const k=ikey(it.floor,it.room,it.item),done=!!checked[k],d=(it.dest||'').toLowerCase();
  if(qFilter==='all')        return true;
  if(qFilter==='done')       return done;
  if(qFilter==='todo')       return !done;
  if(qFilter==='Nivelles')   return d==='nivelles';
  if(qFilter==='Nivelles ?') return d.includes('nivelles ?');
  if(qFilter==='Lio')        return d==='lio';
  if(qFilter==='Laisser')    return d.includes('laisser');
  if(qFilter==='Vendre')     return d.includes('vendre')||d.includes('jeter');
  if(qFilter==='Rox')        return d.includes('rox')||d.includes('lenny');
  return true;
}

// ===== WS SYNC =====
function initWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  try{
    ws=new WebSocket(`${proto}://${location.host}`);
    ws.onopen=()=>setSyncStatus('ok','En ligne');
    ws.onclose=()=>{setSyncStatus('err','Hors ligne');setTimeout(initWS,4000);};
    ws.onerror=()=>setSyncStatus('err','Erreur');
    ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='update'||m.type==='hello')applyState(m.state);};
  }catch(e){setSyncStatus('err','Hors ligne');}
}
function applyState(s){
  if(s.items&&s.items.length)items=s.items;
  if(s.checked)checked=s.checked;
  renderCurrent();updateSidebar();updateProgress();
}
async function pushState(){
  setSyncStatus('syncing','Sync…');
  try{
    await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,checked})});
    setSyncStatus('ok','Sauvé ✓');
  }catch(e){setSyncStatus('err','Erreur');}
}
function setSyncStatus(s,l){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncLabel').textContent=l;}

  document.getElementById('overlay').classList.add('show');
}

// ===== PHOTO =====
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  // Compress before storing
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=600; let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhoto=canvas.toDataURL('image/jpeg',0.7);
      document.getElementById('photoPreview').src=pendingPhoto;
      document.getElementById('photoArea').classList.add('has-img');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function removePhoto(e){
  e.stopPropagation();
  pendingPhoto='';
  document.getElementById('photoPreview').src='';
  document.getElementById('photoArea').classList.remove('has-img');
  document.getElementById('photoInput').value='';
}

  const floor=document.getElementById('mFloor').value;

  const rooms=FLOOR_ROOMS[floor]||[];
  if(!floor){roomSel.innerHTML='<option value="">— d\'abord l\'étage —</option>';return;}
  roomSel.innerHTML=rooms.map(r=>`<option value="${r}">${r}</option>`).join('');
}

function submitModal(){
  const name=document.getElementById('mItem').value.trim();
  if(!name){showToast('⚠️ Entrez un nom');return;}
  const floor=document.getElementById('mFloor').value;
  const room=document.getElementById('mRoom').value;
  if(!floor||!room){showToast('⚠️ Choisissez étage et pièce');return;}
  const dest=document.getElementById('mDest').value;
  const note=document.getElementById('mNote').value.trim();
  const idx=parseInt(document.getElementById('editIdx').value);
  if(idx>=0){
    items[idx]={...items[idx],item:name,floor,room,dest,note,photo:pendingPhoto};
    showToast('✏️ Modifié !');
  } else {
    items.push({floor,room,item:name,dest,note,photo:pendingPhoto});
    const rid=(floor+'_'+room).replace(/\W/g,'_');
    openRooms[rid]=true;
    showToast('✓ '+name+' ajouté !');
  }
  pushState();renderCurrent();updateSidebar();updateProgress();closeModal();
}

  if(!name)return;
  items.push({floor,room,item:name,dest:dest?dest.value:'Nivelles',note:'',photo:''});
  openRooms[rid]=true;
  pushState();renderFloor(floor);updateSidebar();updateProgress();
  showToast('✓ Ajouté dans '+room);
}

// ===== PROGRESS =====
function updateProgress(){
  const total=items.length,done=items.filter(i=>checked[ikey(i.floor,i.room,i.item)]).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLeft').textContent=done+' / '+total+' objets traités';
  document.getElementById('progRight').textContent=pct+'%';
}

// ===== SIDEBAR =====
function updateSidebar(){
  FLOOR_ORDER.forEach(f=>{
    const id=FLOOR_IDS[f];
    const todo=items.filter(i=>i.floor===f&&!checked[ikey(i.floor,i.room,i.item)]).length;
    const el=document.getElementById('cnt-'+id);
    const btn=document.getElementById('sb-'+id);
    if(el)el.textContent=todo;
    if(btn)btn.classList.toggle('has-todo',todo>0);
  });
}
function setSidebarActive(page){
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  if(page==='stats'){document.getElementById('sb-stats').classList.add('active');return;}
  const el=document.getElementById('sb-'+FLOOR_IDS[page]);if(el)el.classList.add('active');
}

// ===== PAGE NAV =====
function showPage(page){
  setSidebarActive(page);
  const sp=document.getElementById('stats-page'),fp=document.getElementById('floor-page');
  const qf=document.getElementById('qfilters'),fab=document.getElementById('fabBtn');
  if(page==='stats'){
    sp.style.display='flex';sp.classList.add('show');
    fp.style.display='none';qf.style.display='none';fab.style.display='none';
    document.getElementById('topbarTitle').innerHTML='📊 <span>Statistiques</span>';
    currentFloor=null;renderStats();
  } else {
    sp.style.display='none';sp.classList.remove('show');
    fp.style.display='flex';qf.style.display='flex';fab.style.display='flex';
    currentFloor=page;
    document.getElementById('topbarTitle').innerHTML='🏠 <span>'+page+'</span>';
    renderFloor(page);
  }
}
function renderCurrent(){currentFloor?renderFloor(currentFloor):renderStats();}

// ===== RENDER FLOOR =====
function renderFloor(floor){
  const container=document.getElementById('floorContent');
  const rooms={};
  items.forEach((it,gi)=>{
    if(it.floor!==floor)return;
    if(!rooms[it.room])rooms[it.room]=[];
    rooms[it.room].push({it,gi});
  });
  const visible=Object.entries(rooms).filter(([room,entries])=>
    qFilter==='all'||entries.some(e=>matchQ(e.it))
  );
  if(!visible.length){
    container.innerHTML='<div class="empty-state"><div class="big">🎉</div>Aucun objet ici</div>';return;
  }
  let html='';
  visible.forEach(([room,entries])=>{
    const rid=(floor+'_'+room).replace(/\W/g,'_');
    const doneC=entries.filter(e=>checked[ikey(e.it.floor,e.it.room,e.it.item)]).length;
    const total=entries.length,pct=total?doneC/total:0;
    const r=12,circ=2*Math.PI*r,dash=(circ*pct).toFixed(2),gap=(circ*(1-pct)).toFixed(2);
    const icon=ROOM_ICONS[room]||'🏠',isOpen=!!openRooms[rid];
    html+=`<div class="room-card ${isOpen?'open':''}" id="rc-${rid}">
      <div class="room-hdr" onclick="toggleRoom('${rid}')">
        <span class="room-icon">${icon}</span>
        <div class="room-info"><div class="room-name">${room}</div><div class="room-sub">${doneC} / ${total} traités</div></div>
        <div class="room-right">
          <svg class="room-ring" viewBox="0 0 32 32">
            <circle class="room-ring-bg" cx="16" cy="16" r="${r}"/>
            <circle class="room-ring-fg" cx="16" cy="16" r="${r}" stroke-dasharray="${dash} ${gap}"/>
            <text class="room-ring-txt" x="16" y="20" text-anchor="middle">${Math.round(pct*100)}%</text>
          </svg>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="room-body">`;
    const toShow=qFilter==='all'?entries:entries.filter(e=>matchQ(e.it));
    toShow.forEach(({it,gi})=>{
      const k=ikey(it.floor,it.room,it.item),done=!!checked[k];
      const {cls,lbl}=badge(it.dest);
      const sk=k.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+=`<div class="item-row ${done?'done':''}">
        <div class="item-tap" onclick="toggleCheck('${sk}')">
          <div class="chk">${done?'✓':''}</div>
          <div class="item-body">
            <div class="item-name">${it.item}</div>
            ${it.note?`<div class="item-note">👤 ${it.note}</div>`:''}
          </div>
          ${it.photo?`<img class="item-thumb" src="${it.photo}" alt="photo">`:''}
          <span class="badge ${cls}">${lbl}</span>
        </div>
        <div class="item-actions">
          <button class="act-btn" onclick="editItem(${gi},event)">✏️</button>
          <button class="act-btn del" onclick="deleteItem(${gi},event)">✕</button>
        </div>
      </div>`;
    });
    const fe=floor.replace(/'/g,"\\'"),re=room.replace(/'/g,"\\'");
    html+=`<div class="qadd-row">
      <input class="qadd-input" placeholder="+ Ajouter dans ${room}…" id="qi-${rid}"
        onkeydown="if(event.key==='Enter')quickAdd('${fe}','${re}','${rid}')">
      <select class="qadd-dest" id="qd-${rid}">
        <option value="Nivelles">🏠 Niv.</option>
        <option value="Nivelles ?">🏠 Niv.?</option>
        <option value="Lio">🌊 Lio</option>
        <option value="À laisser">📌 Laisser</option>
        <option value="À vendre/jeter">♻️ Vendre</option>
        <option value="Rox/Lenny">🎮 Rox</option>
      </select>
      <button class="qadd-btn" onclick="quickAdd('${fe}','${re}','${rid}')">+</button>
    </div></div></div>`;
  });
  container.innerHTML=html;
}

// ===== RENDER STATS =====
function renderStats(){
  const total=items.length,done=items.filter(i=>checked[ikey(i.floor,i.room,i.item)]).length;
  const todo=total-done,pct=total?Math.round(done/total*100):0;
  const destCount={};
  items.forEach(i=>{const d=badge(i.dest).lbl;destCount[d]=(destCount[d]||0)+1;});
  const flStats=FLOOR_ORDER.map(f=>{
    const fl=items.filter(i=>i.floor===f),fd=fl.filter(i=>checked[ikey(i.floor,i.room,i.item)]).length;
    return {f,total:fl.length,done:fd};
  });
  const flLabels=['R.D.C.','1er','2e','3e','Cave'];
  document.getElementById('statsContent').innerHTML=`
    <div class="stat-title">📊 Vue d'<span>ensemble</span></div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-val" style="color:var(--accent)">${total}</div><div class="kpi-lbl">Total</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--laisser)">${done}</div><div class="kpi-lbl">Traités</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--vendre)">${todo}</div><div class="kpi-lbl">Restants</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--lio)">${pct}%</div><div class="kpi-lbl">Avancement</div></div>
    </div>
    <div class="chart-card"><h3>Répartition par destination</h3><canvas id="cDest" height="220"></canvas></div>
    <div class="chart-card"><h3>Avancement par étage</h3><canvas id="cFloor" height="200"></canvas></div>
    <div class="chart-card"><h3>Progression détaillée</h3>
      ${flStats.map((s,i)=>`<div class="floor-stat">
        <div class="floor-stat-row"><span class="floor-stat-name">${flLabels[i]} — ${s.f}</span><span class="floor-stat-nums">${s.done}/${s.total}</span></div>
        <div class="floor-stat-bar"><div class="floor-stat-fill" style="width:${s.total?Math.round(s.done/s.total*100):0}%"></div></div>
      </div>`).join('')}
    </div>
    <div class="chart-card"><h3>Fait vs Restant</h3><canvas id="cDone" height="180"></canvas></div>`;

  Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});
  chartInstances={};
  const dL=Object.keys(destCount),dC=dL.map(l=>{
    if(l==='Nivelles')return'#c4773a';if(l==='Niv. ?')return'#8a6a3a';
    if(l==='Lio')return'#3a7fc4';if(l==='Laisser')return'#3aab6e';
    if(l.includes('Vendre'))return'#c43a3a';if(l.includes('Rox'))return'#7a3ac4';
    return'#aaa';
  });
  chartInstances.dest=new Chart(document.getElementById('cDest'),{
    type:'doughnut',
    data:{labels:dL,datasets:[{data:dL.map(l=>destCount[l]),backgroundColor:dC,borderWidth:2,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Outfit',size:11},padding:10}}},cutout:'62%'}
  });
  chartInstances.floor=new Chart(document.getElementById('cFloor'),{
    type:'bar',
    data:{labels:flLabels,datasets:[
      {label:'Traités',data:flStats.map(s=>s.done),backgroundColor:'#3aab6e',borderRadius:5},
      {label:'Restants',data:flStats.map(s=>s.total-s.done),backgroundColor:'#e2ddd4',borderRadius:5}
    ]},
    options:{plugins:{legend:{labels:{font:{family:'Outfit',size:11}}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{family:'Outfit'}}},y:{stacked:true,grid:{color:'#f0ede8'},ticks:{font:{family:'Outfit'}}}}}
  });
  chartInstances.done=new Chart(document.getElementById('cDone'),{
    type:'doughnut',
    data:{labels:['Faits','Restants'],datasets:[{data:[done,todo],backgroundColor:['#3aab6e','#e2ddd4'],borderWidth:2,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Outfit',size:11}}}},cutout:'68%'}
  });
}

// ===== FILTER =====
function setQF(f,btn){
  qFilter=f;
  document.querySelectorAll('.qchip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  if(currentFloor)renderFloor(currentFloor);
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ===== INIT =====
async function init(){
  try{
    const res=await fetch('/api/state');const s=await res.json();
    if(s.items&&s.items.length)items=s.items;
    if(s.checked)checked=s.checked;
  }catch(e){}
  updateProgress();updateSidebar();showPage('stats');initWS();
}
window.addEventListener('load',()=>{
  init();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{document.getElementById('splash').style.display='none';document.getElementById('app').classList.add('show');},650);
  },3000);
});
</script>
</body>
</html>
